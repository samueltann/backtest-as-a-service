name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  engine:
    name: C++ engine (build + tests)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure and build
        run: |
          cmake -S engine -B engine/build -DCMAKE_BUILD_TYPE=Release
          cmake --build engine/build -j"$(nproc)"
      - name: Run unit tests
        run: ctest --test-dir engine/build --output-on-failure

  backend:
    name: Spring Boot backend (integration tests)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven
      - name: Build engine binary (tests spawn it)
        run: |
          cmake -S engine -B engine/build -DCMAKE_BUILD_TYPE=Release
          cmake --build engine/build -j"$(nproc)" --target backtest-engine
      - name: Run tests
        working-directory: backend
        run: ./mvnw -B test

  frontend:
    name: React frontend (typecheck + build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install
        working-directory: frontend
        run: npm ci
      - name: Typecheck and build
        working-directory: frontend
        run: |
          npx tsc -b
          npm run build

  docker:
    name: Docker images build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build compose images
        run: docker compose build
