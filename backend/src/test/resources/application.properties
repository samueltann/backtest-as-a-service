# Tests use an isolated in-memory database; bundled CSVs are imported fresh.
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.hibernate.ddl-auto=create-drop

engine.binary-path=../engine/build/backtest-engine
engine.bundled-csv-dir=../data/csv
engine.cache-dir=${java.io.tmpdir}/backtest-test-cache
engine.work-dir=${java.io.tmpdir}/backtest-test-jobs
engine.timeout-seconds=60
