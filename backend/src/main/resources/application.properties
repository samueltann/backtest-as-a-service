spring.application.name=backtest-api

# --- Database (H2 file-based for local dev; 'postgres' profile overrides) ---
spring.datasource.url=jdbc:h2:file:./data/h2/backtest;AUTO_SERVER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false

# --- Auth ---
# HS256 signing key (>= 32 bytes). Dev default; override via JWT_SECRET in prod.
jwt.secret=${JWT_SECRET:dev-only-secret-change-me-0123456789abcdef}
jwt.ttl-hours=24

# --- Engine integration ---
# Path to the compiled C++ engine binary and data locations, relative to the
# backend working directory (backend/ when run via ./mvnw spring-boot:run).
engine.binary-path=../engine/build/backtest-engine
engine.bundled-csv-dir=../data/csv
engine.cache-dir=./data/engine-cache
engine.work-dir=${java.io.tmpdir}/backtests
engine.timeout-seconds=60
