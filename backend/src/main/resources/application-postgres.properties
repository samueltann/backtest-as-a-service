# Activated with SPRING_PROFILES_ACTIVE=postgres (used by docker-compose).
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/backtest}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:backtest}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:backtest}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=update
